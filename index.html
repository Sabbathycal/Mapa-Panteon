<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mapa del Panteón</title>

  <!-- Intenta evitar cache del HTML (no siempre es suficiente por sí solo, pero ayuda) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    :root{
      --panel-w: 360px;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --bg: #ffffff;
    }

    *{ box-sizing: border-box; }
    body{
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: #FFF7E5;
    }

    header{
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      background: #265585;
      color: #265585;
    }

    header .title{
      font-size: 20px;
      font-weight: 700;
      margin-right: 8px;
    }

    .controls{
      display: flex;
      gap: 10px;
      flex: 1;
      align-items: center;
      flex-wrap: wrap;
      min-width: 280px;
    }

    select, input, button{
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 10px;
      font-size: 14px;
      background: #fff;
    }

    select{ min-width: 160px; }
    input{ min-width: 220px; flex: 1; }

    button{
      cursor: pointer;
      background: #fff;
      font-weight: 600;
    }
    button:disabled{
      opacity: .5;
      cursor: not-allowed;
    }

    main{
      display: grid;
      grid-template-columns: 1fr var(--panel-w);
      height: calc(100vh - 61px);
    }

    #map{
      width: 100%;
      height: 100%;
      background: #ffffff;
    }

    aside{
      border-left: 1px solid var(--border);
      padding: 14px;
      overflow: auto;
      background: #ffffff;
    }

    #panelTitle{
      margin: 0 0 10px 0;
      font-size: 20px;
    }

    #panelBody{
      font-size: 14px;
      color: var(--text);
    }

    #panelBody p{ margin: 8px 0; color: var(--text); }
    #panelBody code{ background: #f3f4f6; padding: 2px 6px; border-radius: 6px; }

    /* Responsive: en móvil, panel abajo */
    @media (max-width: 980px){
      main{
        grid-template-columns: 1fr;
        grid-template-rows: 60vh auto;
        height: calc(100vh - 90px);
      }
      aside{
        border-left: none;
        border-top: 1px solid var(--border);
      }
      select{ min-width: 140px; }
      input{ min-width: 180px; }
    }
  </style>
</head>

<body>
  <header>
    <div class="title">Mapa del Panteón</div>

    <div class="controls">
      <select id="sectionSelect">
        <option value="">SECCIÓN...</option>
      </select>

      <select id="manzanaSelect">
        <option value="">MANZANA...</option>
      </select>

      <input id="searchInput" placeholder="Buscar lote (ej. 001)" />

      <button id="searchBtn">Buscar</button>
      <button id="toggleLotsBtn">Mostrar lotes</button>
      <button id="backBtn">Volver</button>
    </div>
  </header>

  <main>
    <div id="map"></div>

    <aside>
      <h2 id="panelTitle">Cargando...</h2>
      <div id="panelBody">
        <p style="color: var(--muted);">Espera un momento.</p>
      </div>
    </aside>
  </main>

  <!-- =========================
       MODAL NICHOS (POP-UP)
       ========================= -->
  <div id="nichoModal"
       style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:9999; align-items:center; justify-content:center;">
    <div style="width:min(1100px, 92vw); max-height:90vh; background:#fff; border-radius:14px; overflow:hidden;
                box-shadow:0 20px 60px rgba(0,0,0,.25); display:flex; flex-direction:column;">

      <div style="padding:12px 14px; border-bottom:1px solid #e5e7eb; display:flex; gap:10px; align-items:center; justify-content:space-between;">
        <div>
          <div style="font-weight:800;">Nichos</div>
          <div id="nichoModalSub" style="font-size:12px; color:#6b7280;">Selecciona cara y nicho</div>
        </div>
        <button id="nichoCloseBtn"
                style="height:34px;border:1px solid #e5e7eb;border-radius:10px;background:#fff;padding:0 10px;font-weight:700;cursor:pointer;">
          Cerrar
        </button>
      </div>

      <div style="padding:12px 14px; display:flex; gap:10px; flex-wrap:wrap; border-bottom:1px solid #e5e7eb;">
        <button id="caraConcavoBtn"
                style="height:34px;border:1px solid #e5e7eb;border-radius:10px;background:#fff;padding:0 10px;font-weight:700;cursor:pointer;">
          Cóncavo
        </button>
        <button id="caraConvexoBtn"
                style="height:34px;border:1px solid #e5e7eb;border-radius:10px;background:#fff;padding:0 10px;font-weight:700;cursor:pointer;">
          Convexo
        </button>
        <div id="nichoHint" style="font-size:12px;color:#6b7280;align-self:center;">
          Elige una cara para mostrar la imagen.
        </div>
      </div>

      <div style="padding:14px; overflow:auto;">
        <div id="nichoImgWrap" style="position:relative; width:100%; max-width:1000px; margin:0 auto;">
          <img id="nichoImg" src="" alt="Mapa de nichos"
               style="width:100%; height:auto; display:none; border:1px solid #e5e7eb; border-radius:12px;" />
          <!-- capa transparente para clicks -->
          <div id="nichoClickLayer" style="position:absolute; inset:0; display:none; cursor:crosshair;"></div>
        </div>

        <div id="nichoDebug" style="margin-top:10px; font-size:12px; color:#6b7280;"></div>
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Loader anti-cache para app.js (NO tienes que editar index.html cada vez) -->
  <script>
    (function () {
      window.APP_VERSION = String(Date.now());

      var s = document.createElement("script");
      s.src = "./app.js?v=" + encodeURIComponent(window.APP_VERSION);
      s.defer = true;

      s.onerror = function () {
        document.getElementById("panelTitle").textContent = "Error";
        document.getElementById("panelBody").innerHTML =
          "<p>No pude cargar <code>app.js</code>. Revisa el deploy de GitHub Pages.</p>";
      };

      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
