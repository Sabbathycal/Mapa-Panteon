<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mapa del Panteón</title>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    :root{
      --panel-w: 360px;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --bg: #ffffff;
    }

    *{ box-sizing: border-box; }
    body{
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: #FFF7E5;
    }

    header{
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      background: #265585;
      color: #ffffff;
    }

    header .title{
      font-size: 20px;
      font-weight: 700;
      margin-right: 8px;
    }

    .controls{
      display: flex;
      gap: 10px;
      flex: 1;
      align-items: center;
      flex-wrap: wrap;
      min-width: 280px;
    }

    select, input, button{
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 10px;
      font-size: 14px;
      background: #fff;
    }

    select{ min-width: 160px; }
    input{ min-width: 220px; flex: 1; }

    button{
      cursor: pointer;
      background: #fff;
      font-weight: 600;
    }
    button:disabled{
      opacity: .5;
      cursor: not-allowed;
    }

    main{
      display: grid;
      grid-template-columns: 1fr var(--panel-w);
      height: calc(100vh - 61px);
      background: #ffffff;
    }

    #map{
      width: 100%;
      height: 100%;
      background: #ffffff;
    }

    aside{
      border-left: 1px solid var(--border);
      padding: 14px;
      overflow: auto;
      background: #FFF7E5;
    }

    #panelTitle{
      margin: 0 0 10px 0;
      font-size: 20px;
    }

    #panelBody{
      font-size: 14px;
      color: var(--text);
    }

    #panelBody p{ margin: 8px 0; color: var(--text); }
    #panelBody code{ background: #f3f4f6; padding: 2px 6px; border-radius: 6px; }

    @media (max-width: 980px){
      main{
        grid-template-columns: 1fr;
        grid-template-rows: 60vh auto;
        height: calc(100vh - 90px);
      }
      aside{
        border-left: none;
        border-top: 1px solid var(--border);
      }
      select{ min-width: 140px; }
      input{ min-width: 180px; }
    }

    /* =========================
       TOAST
       ========================= */
    #toast{
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(17,24,39,.92);
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 99999;
      display: none;
      max-width: min(680px, 92vw);
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
    }
    /* =========================
      FULLSCREEN MAP (para editores como ?edit=nichos-overlay)
      - El mapa usa todo el ancho
      - El panel (aside) flota encima (no reduce el mapa)
      ========================= */
    body.fullMap main{
      grid-template-columns: 1fr !important;
    }

    body.fullMap aside{
      position: fixed;
      top: 61px; /* altura del header (ajusta si cambia) */
      right: 0;
      width: var(--panel-w);
      height: calc(100vh - 61px);
      z-index: 9998;
      box-shadow: 0 12px 30px rgba(0,0,0,.18);
    }
        
  </style>
</head>

<body>
  <header>
    <div class="title">Mapa del Panteón</div>

    <div class="controls">
      <select id="sectionSelect">
        <option value="">SECCIÓN...</option>
      </select>

      <select id="manzanaSelect">
        <option value="">MANZANA...</option>
      </select>

      <input id="searchInput" placeholder="Buscar lote (ej. 001)" />

      <button id="searchBtn">Buscar</button>
      <button id="toggleLotsBtn">Mostrar lotes</button>
      <button id="backBtn">Volver</button>
    </div>
  </header>

  <main>
    <div id="map"></div>

    <aside>
      <h2 id="panelTitle">Cargando...</h2>
      <div id="panelBody">
        <p style="color: var(--muted);">Espera un momento.</p>
      </div>
    </aside>
  </main>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- toast helper -->
  <script>
    window.toast = function (msg, ms) {
      var el = document.getElementById("toast");
      if (!el) return;
      el.textContent = msg || "";
      el.style.display = "block";
      clearTimeout(window.__toastT);
      window.__toastT = setTimeout(function(){
        el.style.display = "none";
      }, ms || 1800);
    };
  </script>

  <!-- Loader anti-cache para app.js -->
  <script>
    (function () {
      window.APP_VERSION = String(Date.now());
      var s = document.createElement("script");
      s.src = "./app.js?v=" + encodeURIComponent(window.APP_VERSION);
      s.defer = true;

      s.onerror = function () {
        document.getElementById("panelTitle").textContent = "Error";
        document.getElementById("panelBody").innerHTML =
          "<p>No pude cargar <code>app.js</code>. Revisa el deploy de GitHub Pages.</p>";
      };

      document.body.appendChild(s);
    })();
  </script>

  <!-- =========================
      MODAL: NICHOS
      ========================= -->
  <div id="nichosModal" class="nm-backdrop" style="display:none;">
    <div class="nm-card">
      <div class="nm-header">
        <div>
          <div id="nmTitle" class="nm-title">Nichos</div>
          <div id="nmSubtitle" class="nm-subtitle"></div>
        </div>

        <div class="nm-actions">
          <button id="nmBtnConcavo" class="nm-btn">Cóncavo</button>
          <button id="nmBtnConvexo" class="nm-btn">Convexo</button>
          <button id="nmBtnClose" class="nm-btn nm-btn-primary">Cerrar</button>
        </div>
      </div>

      <div class="nm-body">
        <div class="nm-left">
          <div id="nmStage" class="nm-stage">
            <img id="nmImg" alt="" draggable="false" />
            <!-- overlay svg -->
            <svg id="nmSvg" class="nm-svg" xmlns="http://www.w3.org/2000/svg"></svg>
          </div>

          <div class="nm-zoom">
            <label class="nm-zoom-label">Zoom</label>
            <input id="nmZoom" type="range" min="10" max="250" value="100" />
            <div id="nmZoomPct" class="nm-zoom-pct">100%</div>
          </div>
        </div>

        <div class="nm-right">
          <div class="nm-box">
            <div class="nm-box-title">Selección</div>
            <div id="nmSelection" class="nm-selection">(ninguno)</div>
          </div>

          <div class="nm-hint">
            Tip: clic en un nicho para centrar/zoom. Arrastra para mover la vista.
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
