<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mapa del Panteón</title>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    :root{
      --panel-w: 360px;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --bg: #ffffff;
    }

    *{ box-sizing: border-box; }
    body{
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: #FFF7E5;
    }

    header{
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      background: #265585;
      color: #ffffff;
    }

    header .title{
      font-size: 20px;
      font-weight: 700;
      margin-right: 8px;
    }

    .controls{
      display: flex;
      gap: 10px;
      flex: 1;
      align-items: center;
      flex-wrap: wrap;
      min-width: 280px;
    }

    select, input, button{
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 10px;
      font-size: 14px;
      background: #fff;
    }

    select{ min-width: 160px; }
    input{ min-width: 220px; flex: 1; }

    button{
      cursor: pointer;
      background: #fff;
      font-weight: 600;
    }
    button:disabled{
      opacity: .5;
      cursor: not-allowed;
    }

    main{
      display: grid;
      grid-template-columns: 1fr var(--panel-w);
      height: calc(100vh - 61px);
      background: #ffffff;
    }

    #map{
      width: 100%;
      height: 100%;
      background: #ffffff;
    }

    aside{
      border-left: 1px solid var(--border);
      padding: 14px;
      overflow: auto;
      background: #FFF7E5;
    }

    #panelTitle{
      margin: 0 0 10px 0;
      font-size: 20px;
    }

    #panelBody{
      font-size: 14px;
      color: var(--text);
    }

    #panelBody p{ margin: 8px 0; color: var(--text); }
    #panelBody code{ background: #f3f4f6; padding: 2px 6px; border-radius: 6px; }

    @media (max-width: 980px){
      main{
        grid-template-columns: 1fr;
        grid-template-rows: 60vh auto;
        height: calc(100vh - 90px);
      }
      aside{
        border-left: none;
        border-top: 1px solid var(--border);
      }
      select{ min-width: 140px; }
      input{ min-width: 180px; }
    }

    /* =========================
       TOAST
       ========================= */
    #toast{
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(17,24,39,.92);
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 99999;
      display: none;
      max-width: min(680px, 92vw);
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
    }

    /* =========================
       MODAL NICHOS
       ========================= */
    #nichoModal{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      display: none;           /* flex when open */
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 18px;
    }

    .nichoCard{
      width: min(1180px, 96vw);
      height: min(780px, 92vh);
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(0,0,0,.25);
      display: grid;
      grid-template-columns: 1fr 320px;
    }

    .nichoTop{
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid #e5e7eb;
      background: #ffffff;
    }

    .nichoTitle{
      font-weight: 800;
      font-size: 18px;
    }
    .nichoSub{
      color: #6b7280;
      font-size: 12px;
      margin-top: 2px;
    }

    .nichoBtns{
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .nichoMain{
      position: relative;
      padding: 0;
      background: #f8fafc;
      border-right: 1px solid #e5e7eb;
      overflow: hidden;
    }

    /* viewport con scroll */
    #nichoImageWrap{
      position: absolute;
      inset: 0;
      overflow: auto;
      background: #f8fafc;
    }

    /* elemento escalable */
    #nichoScale{
      position: relative;
      transform-origin: top left;
      will-change: transform;
    }

    #nichoImg{
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* overlay clicks (misma caja que la imagen) */
    #nichoClickLayer{
      position: absolute;
      inset: 0;
      cursor: crosshair;
    }

    .nichoSide{
      padding: 12px 14px;
      background: #ffffff;
      overflow: auto;
    }

    .nichoSide h4{
      margin: 0 0 8px 0;
    }

    .nichoHint{
      font-size: 12px;
      color: #374151;
      margin-bottom: 10px;
    }

    .nichoBox{
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 10px;
      min-height: 90px;
      background: #f9fafb;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      white-space: pre-wrap;
    }

    .zoomRow{
      margin-top: 12px;
    }

    .zoomRow label{
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 6px;
    }

    .zoomRow input[type="range"]{
      width: 100%;
    }
  </style>
</head>

<body>
  <header>
    <div class="title">Mapa del Panteón</div>

    <div class="controls">
      <select id="sectionSelect">
        <option value="">SECCIÓN...</option>
      </select>

      <select id="manzanaSelect">
        <option value="">MANZANA...</option>
      </select>

      <input id="searchInput" placeholder="Buscar lote (ej. 001)" />

      <button id="searchBtn">Buscar</button>
      <button id="toggleLotsBtn">Mostrar lotes</button>
      <button id="backBtn">Volver</button>
    </div>
  </header>

  <main>
    <div id="map"></div>

    <aside>
      <h2 id="panelTitle">Cargando...</h2>
      <div id="panelBody">
        <p style="color: var(--muted);">Espera un momento.</p>
      </div>
    </aside>
  </main>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- MODAL NICHOS -->
  <div id="nichoModal">
    <div class="nichoCard">
      <div class="nichoTop">
        <div>
          <div class="nichoTitle">Nichos</div>
          <div id="nichoModalSub" class="nichoSub">—</div>
        </div>

        <div class="nichoBtns">
          <button id="caraConcavoBtn">Cóncavo</button>
          <button id="caraConvexoBtn">Convexo</button>
          <button id="nichoCloseBtn">Cerrar</button>
          <button id="nichoEditBoxBtn" style="display:none;">Editar posición</button>
          <button id="nichoCloseBtn">Cerrar</button>
        </div>
      </div>

      <div class="nichoMain">
        <div id="nichoImageWrap" style="position:relative; overflow:auto;">
          <div id="nichoScale" style="position:relative; transform-origin: top left;">
            <img id="nichoImg" />
            <div id="nichoClickLayer"></div>
          </div>
        </div>

        <input id="nichoZoomRange" type="range" min="0.1" max="3" step="0.01" value="1" />
        <span id="nichoZoomPct">100%</span>
      </div>

      <div class="nichoSide">
        <div id="nichoHint" class="nichoHint">
          1) Elige cóncavo/convexo. 2) Da click en el nicho.
        </div>

        <h4>Selección</h4>
        <div id="nichoDebug" class="nichoBox"></div>

        <div class="zoomRow">
          <label>
            <span>Zoom</span>
            <span id="nichoZoomPct">100%</span>
          </label>
          <input id="nichoZoomRange" type="range" min="0.1" max="3" step="0.01" value="1" />
        </div>

        <p style="font-size:12px;color:#6b7280;margin-top:10px;">
          Tip: al seleccionar un nicho hacemos zoom automático al nicho.
        </p>
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- toast helper -->
  <script>
    window.toast = function (msg, ms) {
      var el = document.getElementById("toast");
      if (!el) return;
      el.textContent = msg || "";
      el.style.display = "block";
      clearTimeout(window.__toastT);
      window.__toastT = setTimeout(function(){
        el.style.display = "none";
      }, ms || 1800);
    };
  </script>

  <!-- Loader anti-cache para app.js -->
  <script>
    (function () {
      window.APP_VERSION = String(Date.now());
      var s = document.createElement("script");
      s.src = "./app.js?v=" + encodeURIComponent(window.APP_VERSION);
      s.defer = true;

      s.onerror = function () {
        document.getElementById("panelTitle").textContent = "Error";
        document.getElementById("panelBody").innerHTML =
          "<p>No pude cargar <code>app.js</code>. Revisa el deploy de GitHub Pages.</p>";
      };

      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
