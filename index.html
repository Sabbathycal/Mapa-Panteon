<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mapa del Panteón</title>

  <!-- Intenta evitar cache del HTML (no siempre es suficiente por sí solo, pero ayuda) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    :root{
      --panel-w: 360px;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --bg: #ffffff;
    }

    *{ box-sizing: border-box; }
    body{
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: #FFF7E5;
    }

    header{
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      background: #32373c;
      color: #111827;
    }

    header .title{
      font-size: 20px;
      font-weight: 700;
      margin-right: 8px;
    }

    .controls{
      display: flex;
      gap: 10px;
      flex: 1;
      align-items: center;
      flex-wrap: wrap;
      min-width: 280px;
    }

    select, input, button{
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 10px;
      font-size: 14px;
      background: #fff;
    }

    select{ min-width: 160px; }
    input{ min-width: 220px; flex: 1; }

    button{
      cursor: pointer;
      background: #fff;
      font-weight: 600;
    }
    button:disabled{
      opacity: .5;
      cursor: not-allowed;
    }

    main{
      display: grid;
      grid-template-columns: 1fr var(--panel-w);
      height: calc(100vh - 61px);
    }

    #map{
      width: 100%;
      height: 100%;
      background: #ffffff;
    }

    aside{
      border-left: 1px solid var(--border);
      padding: 14px;
      overflow: auto;
    }

    #panelTitle{
      margin: 0 0 10px 0;
      font-size: 20px;
    }

    #panelBody{
      font-size: 14px;
      color: var(--text);
    }

    #panelBody p{ margin: 8px 0; color: var(--text); }
    #panelBody code{ background: #f3f4f6; padding: 2px 6px; border-radius: 6px; }

    /* Responsive: en móvil, panel abajo */
    @media (max-width: 980px){
      main{
        grid-template-columns: 1fr;
        grid-template-rows: 60vh auto;
        height: calc(100vh - 90px);
      }
      aside{
        border-left: none;
        border-top: 1px solid var(--border);
      }
      select{ min-width: 140px; }
      input{ min-width: 180px; }
    }
  </style>
</head>

<body>
  <header>
    <div class="title">Mapa del Panteón</div>

    <div class="controls">
      <select id="sectionSelect">
        <option value="">SECCIÓN...</option>
      </select>

      <select id="manzanaSelect">
        <option value="">MANZANA...</option>
      </select>

      <input id="searchInput" placeholder="Buscar lote (ej. 001)" />

      <button id="searchBtn">Buscar</button>
      <button id="toggleLotsBtn">Mostrar lotes</button>
      <button id="backBtn">Volver</button>
    </div>
  </header>

  <main>
    <div id="map"></div>

    <aside>
      <h2 id="panelTitle">Cargando...</h2>
      <div id="panelBody">
        <p style="color: var(--muted);">Espera un momento.</p>
      </div>
    </aside>
  </main>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Loader anti-cache para app.js (NO tienes que editar index.html cada vez) -->
  <script>
    (function () {
      // Version automática: cambia en cada carga
      // (evita cache; ya no necesitas incógnito ni Ctrl+Shift+R)
      window.APP_VERSION = String(Date.now());

      var s = document.createElement("script");
      s.src = "./app.js?v=" + encodeURIComponent(window.APP_VERSION);
      s.defer = true;

      s.onerror = function () {
        document.getElementById("panelTitle").textContent = "Error";
        document.getElementById("panelBody").innerHTML =
          "<p>No pude cargar <code>app.js</code>. Revisa el deploy de GitHub Pages.</p>";
      };

      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
